<!DOCTYPE html>
<html lang="pt-BR" data-base="/">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c120d">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <link rel="icon" href="/assets/icons/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/pages.css">
  <link rel="stylesheet" href="/styles/admin.css">
  <link rel="stylesheet" href="/styles/responsive.css">
  <title>Login Administrativo | TolkienCraft</title>
</head>
<body data-page="admin-login" class="admin-page">
  <header class="site-header" data-site-header></header>

  <main id="conteudo" class="auth-main">
    <section class="auth-card" aria-labelledby="login-title">
      <h1 id="login-title">Login Administrativo</h1>

      <div class="auth-alert" data-auth-alert role="alert" aria-live="assertive" hidden></div>

      <form class="auth-form" data-login-form novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" maxlength="255" autocomplete="username" inputmode="email" required aria-describedby="email-error">
          <span class="field-error" id="email-error" data-field-error="email"></span>
        </div>

        <div class="form-field">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" maxlength="255" autocomplete="current-password" required aria-describedby="senha-error">
          <span class="field-error" id="senha-error" data-field-error="senha"></span>
        </div>

        <button class="button auth-submit" type="submit" data-submit-button>Entrar</button>
      </form>
    </section>
  </main>

  <footer class="footer" data-site-footer></footer>
  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/adm/login.js"></script>
</body>
</html>
